# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/spendix_db
spring.datasource.username=spendix_user
spring.datasource.password=spendix
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080
spring.application.name=spendix-backend